<!DOCTYPE html>
<html lang="id" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chatty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>tailwind.config={darkMode:'class'}</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .msg-in { animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 20px; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        @media (min-width: 768px) { 
            .chat-max { max-width: 700px; margin: 0 auto; }
            .home-card { max-width: 400px; }
        }
        .dropdown-menu { display: none; }
        .dropdown.active .dropdown-menu { display: block; }
        .typing-dot { animation: bounce 1.4s infinite; display: inline-block; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-white dark:bg-gray-950 min-h-screen transition-colors">

    <!-- ============ HOME SCREEN ============ -->
    <div id="homeScreen" class="min-h-screen flex items-center justify-center p-5">
        <div class="home-card w-full text-center fade-in">
            <div class="text-5xl mb-4">💬</div>
            <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white mb-1">Chatty</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">Simple, fast, anonymous.</p>
            
            <input type="text" id="usernameInput" placeholder="Nama kamu" 
                class="w-full px-4 py-3.5 bg-gray-50 dark:bg-gray-800 border-2 border-gray-100 dark:border-gray-700 rounded-2xl text-sm font-semibold text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:border-gray-900 dark:focus:border-gray-500 mb-3 transition-colors"
                maxlength="20" autocomplete="off" oninput="this.value=this.value.replace(/[<>\"']/g,'')">
            
            <button onclick="createRoom()" class="w-full bg-gray-900 dark:bg-white dark:text-gray-900 text-white py-3.5 rounded-2xl font-bold text-sm hover:bg-gray-800 dark:hover:bg-gray-200 active:scale-[0.98] transition-all mb-3">
                Buat Room
            </button>
            
            <div class="flex gap-2">
                <input type="text" id="roomCodeInput" placeholder="Kode room" 
                    class="flex-1 px-4 py-3.5 bg-gray-50 dark:bg-gray-800 border-2 border-gray-100 dark:border-gray-700 rounded-2xl text-sm uppercase tracking-[0.2em] text-center font-extrabold text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:border-gray-900 dark:focus:border-gray-500 transition-colors"
                    maxlength="6" oninput="this.value=this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase()" autocomplete="off">
                <button onclick="joinRoom()" class="px-6 py-3.5 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded-2xl font-bold text-sm hover:bg-gray-200 dark:hover:bg-gray-700 active:scale-[0.98] transition-all">
                    Join
                </button>
            </div>
            
            <button onclick="toggleDark()" class="mt-6 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-xs font-medium">
                <i class="fas fa-moon dark:fa-sun mr-1"></i> Dark mode
            </button>
        </div>
    </div>

    <!-- ============ CHAT SCREEN ============ -->
    <div id="chatScreen" class="hidden h-[100dvh] flex flex-col">
        
        <!-- Header -->
        <header class="bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 px-4 py-3 flex items-center gap-3 shrink-0 chat-max w-full">
            <button onclick="leaveRoom()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-1.5 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                <i class="fas fa-chevron-left text-sm"></i>
            </button>
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                    <h1 class="font-bold text-gray-900 dark:text-white text-sm truncate" id="roomName">Chat Room</h1>
                    <button onclick="editRoomName()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 flex-shrink-0"><i class="fas fa-pen text-[10px]"></i></button>
                </div>
                <div class="flex items-center gap-2">
                    <p class="text-[11px] text-gray-500 dark:text-gray-400">Kode: <span class="font-mono font-bold text-gray-900 dark:text-white" id="roomCode">------</span></p>
                    <button onclick="copyRoomCode()" class="text-gray-400 hover:text-green-500 text-[10px]" title="Salin kode"><i class="fas fa-copy"></i></button>
                </div>
                <p class="text-[10px] text-gray-400 mt-0.5" id="onlineCount">● 0 online</p>
            </div>
            <button onclick="toggleDark()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-1.5 rounded-full"><i class="fas fa-moon dark:fa-sun text-sm"></i></button>
        </header>
        
        <!-- Messages -->
        <div id="messagesContainer" class="flex-1 overflow-y-auto px-4 py-4 space-y-4 chat-max w-full">
            <div class="text-center py-20" id="messagesEmpty">
                <div class="text-4xl mb-3 opacity-50">💬</div>
                <p class="text-gray-400 dark:text-gray-500 text-sm font-medium">Belum ada pesan</p>
            </div>
        </div>
        
        <!-- Typing indicator -->
        <div id="typingIndicator" class="hidden px-4 py-1 chat-max w-full">
            <p class="text-[11px] text-gray-400 dark:text-gray-500 italic flex items-center gap-1">
                <span class="flex gap-0.5">
                    <span class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full"></span>
                    <span class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full"></span>
                    <span class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full"></span>
                </span>
                <span id="typingText"></span>
            </p>
        </div>
        
        <!-- Input (FIXED) -->
        <div class="bg-white dark:bg-gray-900 border-t border-gray-100 dark:border-gray-800 px-4 py-3 shrink-0 chat-max w-full">
            <div class="flex gap-2 items-center">
                <input type="text" id="messageInput" placeholder="Tulis pesan..." 
                    class="flex-1 px-5 py-3.5 bg-gray-50 dark:bg-gray-800 border-2 border-gray-100 dark:border-gray-700 rounded-full text-sm font-medium text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:border-gray-400 dark:focus:border-gray-600 transition-colors"
                    onkeypress="if(event.key==='Enter')sendMessage()" oninput="handleTyping()" autocomplete="off">
                <button onclick="sendMessage()" class="w-11 h-11 bg-gray-900 dark:bg-white dark:text-gray-900 text-white rounded-full flex items-center justify-center hover:bg-gray-800 dark:hover:bg-gray-200 active:scale-95 transition-all flex-shrink-0">
                    <i class="fas fa-arrow-up text-sm"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-gray-900 dark:bg-white dark:text-gray-900 text-white px-5 py-2.5 rounded-full shadow-xl hidden text-xs font-semibold z-50">
        <span id="toastMsg"></span>
    </div>

    <script>
        // ============================================
        // CONFIG
        // ============================================
        var SUPABASE_URL = 'https://chieagnneldopundhqsw.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_uQlLV_IM9-OFnwmZD8WxHQ_fRuVEarJ';
        
        var supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        var username = '', currentRoom = null, channel = null, userColor = '#111827';
        var colors = ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f97316'];
        var typingTimer = null, requestCount = 0, lastReset = Date.now();
        
        function randomColor() { return colors[Math.floor(Math.random() * colors.length)]; }
        function genCode() { var c='',ch='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; for(var i=0;i<6;i++)c+=ch.charAt(Math.floor(Math.random()*ch.length)); return c; }
        
        // ============================================
        // DARK MODE
        // ============================================
        if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');
        function toggleDark() { var d = document.documentElement.classList.toggle('dark'); localStorage.setItem('darkMode', d); }
        
        // ============================================
        // RATE LIMITING
        // ============================================
        function checkRateLimit() {
            var now = Date.now();
            if (now - lastReset > 60000) { requestCount = 0; lastReset = now; }
            if (requestCount >= 30) { showToast('⚠️ Terlalu cepat! Tunggu sebentar...'); return false; }
            requestCount++; return true;
        }
        
        // ============================================
        // API CALL
        // ============================================
        function apiCall(endpoint, method, body) {
            if (!checkRateLimit()) return Promise.reject('rate_limit');
            var opts = { method: method || 'GET', headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' } };
            if (username) opts.headers['X-Chat-Username'] = username;
            if (body && method !== 'DELETE') opts.body = JSON.stringify(body);
            return fetch(SUPABASE_URL + '/rest/v1/' + endpoint, opts).then(function(r) { if (!r.ok) return r.text().then(function(t) { throw new Error(t); }); var ct = r.headers.get('content-type'); if (ct && ct.includes('application/json')) return r.json(); return []; });
        }
        
        // ============================================
        // CLEANUP EXPIRED ROOMS
        // ============================================
        function cleanupRooms() {
            supabase.rpc('cleanup_expired_rooms').then(function() { console.log('Cleanup done'); });
        }
        
        // ============================================
        // ROOM
        // ============================================
        function createRoom() {
            cleanupRooms();
            username = document.getElementById('usernameInput').value.trim().replace(/[<>\"']/g, '');
            if (!username || username.length < 2) { showToast('Nama minimal 2 karakter'); return; }
            userColor = randomColor();
            var code = genCode();
            apiCall('chat_rooms', 'POST', { code: code, name: username + "'s Room" }).then(function(r) {
                if (!r || r.length === 0) { createRoom(); return; }
                enterRoom(r[0]);
            }).catch(function() {});
        }
        
        function joinRoom() {
            username = document.getElementById('usernameInput').value.trim().replace(/[<>\"']/g, '');
            if (!username || username.length < 2) { showToast('Nama minimal 2 karakter'); return; }
            userColor = randomColor();
            var code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!code || code.length < 6) { showToast('Masukkan kode room'); return; }
            var expiry = new Date(Date.now() - 3600000).toISOString();
            apiCall('chat_rooms?code=eq.' + code + '&last_activity=gte.' + expiry).then(function(r) {
                if (!r || r.length === 0) { showToast('❌ Room tidak ditemukan atau expired'); return; }
                enterRoom(r[0]);
            }).catch(function() {});
        }
        
        function enterRoom(room) {
            currentRoom = room;
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('roomName').textContent = room.name || 'Chat Room';
            document.getElementById('roomCode').textContent = room.code;
            document.getElementById('messageInput').focus();
            markOnline();
            loadMessages();
            subscribeAll(room.id);
            updateActivity();
        }
        
        function editRoomName() {
            var name = prompt('Nama room baru:', currentRoom.name);
            if (!name || !name.trim()) return;
            apiCall('chat_rooms?id=eq.' + currentRoom.id, 'PATCH', { name: name.trim() }).then(function() {
                currentRoom.name = name.trim();
                document.getElementById('roomName').textContent = name.trim();
            });
        }
        
        function leaveRoom() {
            if (channel) supabase.removeChannel(channel);
            if (currentRoom) apiCall('online_users?room_id=eq.' + currentRoom.id + '&username=eq.' + encodeURIComponent(username), 'DELETE');
            stopTyping();
            currentRoom = null;
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('chatScreen').classList.add('hidden');
            document.getElementById('messagesContainer').innerHTML = '<div class="text-center py-20"><div class="text-4xl mb-3 opacity-50">💬</div><p class="text-gray-400 text-sm">Belum ada pesan</p></div>';
        }
        
        function updateActivity() {
            if (!currentRoom) return;
            apiCall('chat_rooms?id=eq.' + currentRoom.id, 'PATCH', { last_activity: new Date().toISOString() });
        }
        
        // ============================================
        // ONLINE
        // ============================================
        function markOnline() {
            apiCall('online_users', 'POST', { room_id: currentRoom.id, username: username, color: userColor, last_seen: new Date().toISOString() });
        }
        
        // ============================================
        // MESSAGES
        // ============================================
        function loadMessages() {
            apiCall('chat_messages?room_id=eq.' + currentRoom.id + '&order=created_at.asc').then(function(r) {
                document.getElementById('messagesContainer').innerHTML = '';
                if (r && r.length > 0) { r.forEach(function(m) { renderMsg(m, false); }); }
                else { document.getElementById('messagesContainer').innerHTML = '<div class="text-center py-20"><div class="text-4xl mb-3 opacity-50">💬</div><p class="text-gray-400 text-sm">Belum ada pesan</p></div>'; }
                scrollBottom();
            });
        }
        
        function sendMessage() {
            var input = document.getElementById('messageInput'), content = input.value.trim();
            if (!content || !currentRoom) return;
            apiCall('chat_messages', 'POST', { room_id: currentRoom.id, username: username, content: content, color: userColor }).then(function() {
                updateActivity();
                stopTyping();
            });
            input.value = '';
        }
        
        function editMessage(id, oldContent) {
            var content = prompt('Edit pesan:', oldContent);
            if (!content || !content.trim()) return;
            apiCall('chat_messages?id=eq.' + id, 'PATCH', { content: content.trim(), edited: true }).then(function() { loadMessages(); });
        }
        
        function deleteMessage(id) {
            if (!confirm('Hapus permanen?')) return;
            apiCall('chat_messages?id=eq.' + id, 'DELETE').then(function() { loadMessages(); });
        }
        
        // ============================================
        // TYPING
        // ============================================
        function handleTyping() {
            if (!currentRoom) return;
            apiCall('typing_status', 'POST', { room_id: currentRoom.id, username: username, updated_at: new Date().toISOString() });
            clearTimeout(typingTimer);
            typingTimer = setTimeout(stopTyping, 2000);
        }
        
        function stopTyping() {
            if (!currentRoom) return;
            apiCall('typing_status?room_id=eq.' + currentRoom.id + '&username=eq.' + encodeURIComponent(username), 'DELETE');
        }
        
        // ============================================
        // SUBSCRIBE
        // ============================================
        function subscribeAll(roomId) {
            if (channel) supabase.removeChannel(channel);
            channel = supabase.channel('room-' + roomId)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: 'room_id=eq.' + roomId }, function(p) { renderMsg(p.new, true); })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'chat_messages', filter: 'room_id=eq.' + roomId }, function() { loadMessages(); })
                .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'chat_messages', filter: 'room_id=eq.' + roomId }, function() { loadMessages(); })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'online_users', filter: 'room_id=eq.' + roomId }, function() { updateOnlineCount(); })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'typing_status', filter: 'room_id=eq.' + roomId }, function(p) { showTyping(p.new); })
                .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'typing_status', filter: 'room_id=eq.' + roomId }, function() { updateTypingDisplay(); })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'chat_rooms', filter: 'id=eq.' + roomId }, function() {})
                .subscribe();
            updateOnlineCount();
        }
        
        function showTyping(data) {
            if (data.username === username) return;
            document.getElementById('typingIndicator').classList.remove('hidden');
            document.getElementById('typingText').textContent = data.username + ' mengetik...';
            clearTimeout(window._typingTimeout);
            window._typingTimeout = setTimeout(function() { document.getElementById('typingIndicator').classList.add('hidden'); }, 3000);
        }
        
        function updateTypingDisplay() {
            apiCall('typing_status?room_id=eq.' + currentRoom.id).then(function(r) {
                var others = r ? r.filter(function(t) { return t.username !== username; }) : [];
                if (others.length === 0) document.getElementById('typingIndicator').classList.add('hidden');
            });
        }
        
        function updateOnlineCount() {
            apiCall('online_users?room_id=eq.' + currentRoom.id).then(function(r) {
                document.getElementById('onlineCount').textContent = '● ' + (r ? r.length : 0) + ' online';
            });
        }
        
        // ============================================
        // RENDER
        // ============================================
        function renderMsg(msg, isNew) {
            var c = document.getElementById('messagesContainer');
            if (c.querySelector('.text-4xl')) c.innerHTML = '';
            var isMe = (msg.username === username);
            var d = document.createElement('div');
            d.className = 'flex flex-col ' + (isMe ? 'items-end' : 'items-start') + ' msg-in group';
            
            d.innerHTML = 
                '<p class="text-[11px] font-bold mb-1 ' + (isMe ? 'text-right mr-2' : 'ml-2') + '" style="color:' + (msg.color || '#111827') + '">' + escapeHtml(msg.username) + '</p>' +
                '<div class="relative max-w-[80%]">' +
                '<div class="px-4 py-2.5 text-sm font-medium leading-relaxed ' + (isMe ? 'bg-gray-900 dark:bg-white dark:text-gray-900 text-white rounded-2xl rounded-br-md' : 'bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-gray-200 rounded-2xl rounded-bl-md') + '">' + escapeHtml(msg.content) + '</div>' +
                (msg.edited ? '<p class="text-[10px] text-gray-400 mt-0.5 ' + (isMe ? 'text-right mr-2' : 'ml-2') + '">diedit</p>' : '') +
                (isMe ? '<div class="absolute top-0 ' + (isMe ? '-left-8' : '') + ' dropdown">' +
                '<button onclick="this.parentElement.classList.toggle(\'active\')" class="text-gray-400 hover:text-gray-600 p-1 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fas fa-ellipsis-vertical text-xs"></i></button>' +
                '<div class="dropdown-menu absolute ' + (isMe ? 'left-6' : 'right-6') + ' top-0 bg-white dark:bg-gray-700 shadow-xl rounded-lg py-1 z-10 border dark:border-gray-600">' +
                '<button onclick="editMessage(' + msg.id + ',\'' + escapeHtml(msg.content).replace(/'/g, "\\'") + '\')" class="block w-full text-left px-4 py-1.5 text-xs text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-600">✏️ Edit</button>' +
                '<button onclick="deleteMessage(' + msg.id + ')" class="block w-full text-left px-4 py-1.5 text-xs text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20">🗑️ Hapus</button>' +
                '</div></div>' : '') +
                '</div>' +
                '<p class="text-[10px] text-gray-400 mt-1 ' + (isMe ? 'text-right mr-2' : 'ml-2') + '">' + formatTime(msg.created_at) + '</p>';
            
            c.appendChild(d);
            if (isNew && !isMe) scrollBottom();
            if (isMe) scrollBottom();
        }
        
        function scrollBottom() { var c = document.getElementById('messagesContainer'); setTimeout(function() { c.scrollTop = c.scrollHeight; }, 50); }
        function formatTime(d) { if (!d) return ''; var dt = new Date(d); return String(dt.getHours()).padStart(2, '0') + ':' + String(dt.getMinutes()).padStart(2, '0'); }
        function showToast(m) { var t = document.getElementById('toast'); document.getElementById('toastMsg').textContent = m; t.classList.remove('hidden'); clearTimeout(t._t); t._t = setTimeout(function() { t.classList.add('hidden'); }, 2500); }
        function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
        function copyRoomCode() { navigator.clipboard.writeText(currentRoom.code).then(function() { showToast('📋 Kode disalin!'); }); }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown')) {
                document.querySelectorAll('.dropdown.active').forEach(function(d) { d.classList.remove('active'); });
            }
        });
    </script>
</body>
</html>
